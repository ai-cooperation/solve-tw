<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發票對帳 AI 助手</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: #f8f9fa; color: #333; font-size: 16px; }

.header { background: #1a5276; color: #fff; padding: 12px 16px; text-align: center; }
.header h1 { font-size: 20px; }
.header small { color: #aed6f1; font-size: 13px; }

/* Tabs */
.tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; overflow-x: auto; }
.tab { flex: 1; min-width: 60px; padding: 12px 6px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; font-size: 13px; transition: all .2s; }
.tab.active { border-bottom-color: #2980b9; background: #eaf2f8; font-weight: bold; }
.tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }

.content { max-width: 700px; margin: 0 auto; padding: 16px; }
.panel { display: none; }
.panel.active { display: block; }

/* Form */
label { display: block; font-weight: bold; margin: 14px 0 4px; font-size: 14px; }
input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; font-family: inherit; }
input:focus, textarea:focus { outline: none; border-color: #2980b9; box-shadow: 0 0 0 3px rgba(41,128,185,.15); }
.hint { font-size: 13px; color: #999; margin-top: 4px; }

/* Buttons */
.btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; transition: all .2s; }
.btn-primary { background: #2980b9; color: #fff; }
.btn-primary:hover { background: #2471a3; }
.btn-secondary { background: #eee; color: #555; }
.btn-sm { display: inline-block; width: auto; padding: 8px 14px; font-size: 14px; margin-top: 8px; }
.btn-row { display: flex; gap: 8px; margin-top: 12px; }
.btn-row .btn { flex: 1; margin-top: 0; }

/* Upload area */
.upload-zone { border: 2px dashed #bbb; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all .2s; margin-top: 12px; }
.upload-zone:hover, .upload-zone.dragover { border-color: #2980b9; background: #eaf2f8; }
.upload-zone input { display: none; }
.upload-icon { font-size: 40px; margin-bottom: 8px; }
.upload-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.upload-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }

/* Table */
.data-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
.data-table th { background: #2980b9; color: #fff; padding: 8px 6px; text-align: left; font-size: 13px; position: sticky; top: 0; }
.data-table td { padding: 8px 6px; border-bottom: 1px solid #eee; }
.data-table tr:hover { background: #eaf2f8; }
.table-wrap { max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; margin-top: 12px; }

/* Tags */
.tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-right: 4px; }
.tag-ok { background: #d4efdf; color: #1e8449; }
.tag-warn { background: #fdebd0; color: #b9770e; }
.tag-err { background: #fadbd8; color: #922b21; }
.tag-cat { background: #d6eaf8; color: #21618c; }

/* Stats cards */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 16px 0; }
.stat-card { background: #fff; border-radius: 8px; padding: 14px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.stat-num { font-size: 26px; font-weight: bold; color: #2980b9; }
.stat-label { font-size: 12px; color: #888; margin-top: 2px; }

/* Status */
.status { padding: 10px 16px; border-radius: 8px; margin: 12px 0; font-size: 14px; }
.status-ok { background: #d4efdf; color: #1e8449; }
.status-warn { background: #fdebd0; color: #b9770e; }
.status-err { background: #fadbd8; color: #922b21; }

/* Loading */
.loading { text-align: center; padding: 24px; color: #999; }
.loading::after { content: ''; display: inline-block; width: 18px; height: 18px; border: 3px solid #ddd; border-top-color: #2980b9; border-radius: 50%; animation: spin .8s linear infinite; margin-left: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Chart */
.chart-bar { display: flex; align-items: center; margin: 4px 0; }
.chart-label { width: 120px; font-size: 13px; text-align: right; padding-right: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chart-fill { height: 22px; background: #2980b9; border-radius: 4px; min-width: 2px; transition: width .3s; }
.chart-val { font-size: 13px; padding-left: 6px; color: #555; white-space: nowrap; }

/* Settings */
.settings { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.settings summary { cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div class="header">
  <h1>📄 發票對帳 AI 助手</h1>
  <small>拍照辨識 → 自動分類 → 一鍵對帳 ｜ cooperation.tw</small>
</div>

<div class="tabs">
  <div class="tab active" data-tab="scan"><span class="tab-icon">📸</span>拍照辨識</div>
  <div class="tab" data-tab="import"><span class="tab-icon">📥</span>匯入 CSV</div>
  <div class="tab" data-tab="match"><span class="tab-icon">🔗</span>對帳</div>
  <div class="tab" data-tab="report"><span class="tab-icon">📊</span>報表</div>
  <div class="tab" data-tab="settings"><span class="tab-icon">⚙️</span>設定</div>
</div>

<div class="content">

<!-- ===== 拍照辨識 ===== -->
<div class="panel active" id="panel-scan">
  <p style="color:#666; margin-bottom:8px;">拍照或上傳紙本發票 → AI 自動辨識所有欄位</p>
  <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept="image/*" multiple capture="environment">
    <div class="upload-icon">📸</div>
    <div>拍照 / 選擇發票圖片</div>
    <div class="hint">支援一次多張，JPG/PNG 皆可</div>
  </div>
  <div class="upload-preview" id="upload-preview"></div>
  <button class="btn btn-primary" id="scan-btn" style="display:none" onclick="scanInvoices()">🔍 AI 辨識全部發票</button>
  <div id="scan-output"></div>
</div>

<!-- ===== 匯入 CSV ===== -->
<div class="panel" id="panel-import">
  <p style="color:#666; margin-bottom:8px;">匯入電子發票 CSV（財政部格式或自訂格式皆可）</p>

  <label>發票 CSV</label>
  <textarea id="csv-invoices" placeholder="發票號碼,日期,賣方統編,賣方名稱,品名,數量,單價,金額,稅額&#10;AB12345678,2026-03-15,12345678,大同文具,A4影印紙,5,120,600,30" style="min-height:120px; font-size:14px; font-family:monospace;"></textarea>
  <button class="btn btn-secondary btn-sm" onclick="loadDemoInvoices()">載入 50 筆模擬發票</button>
  <button class="btn btn-primary" onclick="importCSV()">📥 匯入並自動分類</button>
  <div id="import-output"></div>

  <h3 style="margin-top:20px; font-size:16px;">訂單 CSV（對帳用）</h3>
  <textarea id="csv-orders" placeholder="訂單編號,供應商統編,品名,金額,日期&#10;PO-001,12345678,A4影印紙,600,2026-03-14" style="min-height:80px; font-size:14px; font-family:monospace;"></textarea>
  <button class="btn btn-secondary btn-sm" onclick="loadDemoOrders()">載入模擬訂單</button>
</div>

<!-- ===== 對帳 ===== -->
<div class="panel" id="panel-match">
  <p style="color:#666; margin-bottom:8px;">發票 vs 訂單自動比對，標記差異和異常</p>
  <div class="stats" id="match-stats"></div>
  <button class="btn btn-primary" onclick="runMatch()">🔗 執行對帳</button>
  <div id="match-output"></div>
</div>

<!-- ===== 報表 ===== -->
<div class="panel" id="panel-report">
  <p style="color:#666; margin-bottom:8px;">各科目支出統計與異常摘要</p>
  <button class="btn btn-primary" onclick="genReport()">📊 產生月報表</button>
  <div id="report-output"></div>
</div>

<!-- ===== 設定 ===== -->
<div class="panel" id="panel-settings">
  <div class="settings">
    <label>AI 服務（辨識發票用）</label>
    <select id="ai-provider">
      <option value="gemini">Google Gemini（免費，支援圖片辨識）</option>
      <option value="openai">OpenAI</option>
    </select>
    <label>API Key</label>
    <input type="password" id="api-key" placeholder="貼上 API Key">
    <div class="hint" style="color:#1e8449;">🔒 Key 只在記憶體中，關頁面即消失</div>
    <button class="btn btn-secondary btn-sm" onclick="testKey()">測試連線</button>
    <div id="key-status"></div>
  </div>

  <div class="settings" style="margin-top:16px;">
    <h3 style="font-size:16px; margin-bottom:8px;">會計科目對照表</h3>
    <div class="hint" style="margin-bottom:8px;">系統預設 12 個常用科目，可自行新增</div>
    <div id="cat-list"></div>
    <div style="display:flex; gap:8px; margin-top:8px;">
      <input type="text" id="new-cat" placeholder="新增科目，例：差旅費" style="flex:1">
      <button class="btn btn-secondary btn-sm" onclick="addCategory()">+ 新增</button>
    </div>
  </div>
</div>

</div>

<script>
// ===== Tab switching =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ===== Categories =====
const DEFAULT_CATS = ['辦公用品','維修材料','水電費','電信費','運費','保險費','租金','廣告行銷','餐飲交際','清潔用品','資訊設備','雜支'];
function getCats() { return JSON.parse(localStorage.getItem('inv_cats') || JSON.stringify(DEFAULT_CATS)); }
function saveCats(c) { localStorage.setItem('inv_cats', JSON.stringify(c)); renderCats(); }
function renderCats() {
  const cats = getCats();
  document.getElementById('cat-list').innerHTML = cats.map(c => `<span class="tag tag-cat">${c}</span>`).join(' ');
}
function addCategory() {
  const v = document.getElementById('new-cat').value.trim();
  if (!v) return;
  const cats = getCats();
  if (!cats.includes(v)) { cats.push(v); saveCats(cats); }
  document.getElementById('new-cat').value = '';
}
renderCats();

// ===== Invoice storage =====
function getInvoices() { return JSON.parse(localStorage.getItem('inv_data') || '[]'); }
function saveInvoices(d) { localStorage.setItem('inv_data', JSON.stringify(d)); }
function getOrders() { return JSON.parse(localStorage.getItem('inv_orders') || '[]'); }
function saveOrders(d) { localStorage.setItem('inv_orders', JSON.stringify(d)); }

// ===== File upload =====
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
let uploadedFiles = [];

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  uploadedFiles = [...files].filter(f => f.type.startsWith('image/'));
  const preview = document.getElementById('upload-preview');
  preview.innerHTML = '';
  uploadedFiles.forEach(f => {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(f);
    preview.appendChild(img);
  });
  document.getElementById('scan-btn').style.display = uploadedFiles.length ? 'block' : 'none';
}

// ===== AI Call =====
async function callAI(prompt, imageBase64) {
  const key = sessionStorage.getItem('inv_api-key');
  const provider = sessionStorage.getItem('inv_ai-provider') || 'gemini';
  if (!key) throw new Error('請先到「設定」填入 API Key');

  if (provider === 'gemini') {
    const model = 'gemini-3.1-flash-lite-preview';
    const parts = [{ text: prompt }];
    if (imageBase64) {
      parts.push({ inline_data: { mime_type: 'image/jpeg', data: imageBase64 } });
    }
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts }] })
    });
    const body = await r.text();
    if (r.ok) {
      const d = JSON.parse(body);
      return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }
    let msg = `HTTP ${r.status}`;
    try { msg = JSON.parse(body).error?.message || msg; } catch(_) {}
    throw new Error(msg);
  } else {
    const messages = [{ role: 'user', content: imageBase64
      ? [{ type: 'text', text: prompt }, { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + imageBase64 } }]
      : prompt
    }];
    const r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({ model: 'gpt-4o-mini', messages, temperature: 0.1 })
    });
    if (!r.ok) throw new Error('API 錯誤：' + r.status);
    const d = await r.json();
    return d.choices?.[0]?.message?.content || '';
  }
}

// ===== Test key =====
async function testKey() {
  const key = document.getElementById('api-key').value.trim();
  const provider = document.getElementById('ai-provider').value;
  const el = document.getElementById('key-status');
  if (!key) { el.innerHTML = '<div class="status status-warn">請先填入 API Key</div>'; return; }
  el.innerHTML = '<div class="loading">測試中</div>';
  try {
    if (provider === 'gemini') {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
      if (!r.ok) throw new Error('Key 無效');
    } else {
      const r = await fetch('https://api.openai.com/v1/models', { headers: { 'Authorization': 'Bearer ' + key } });
      if (!r.ok) throw new Error('Key 無效');
    }
    sessionStorage.setItem('inv_api-key', key);
    sessionStorage.setItem('inv_ai-provider', provider);
    el.innerHTML = '<div class="status status-ok">✅ 連線成功！</div>';
  } catch(e) {
    el.innerHTML = '<div class="status status-err">❌ ' + e.message + '</div>';
  }
}

// ===== Scan invoices (photo → AI) =====
async function scanInvoices() {
  const el = document.getElementById('scan-output');
  el.innerHTML = `<div class="loading">正在辨識 ${uploadedFiles.length} 張發票</div>`;
  const cats = getCats().join('、');
  const results = [];

  for (let i = 0; i < uploadedFiles.length; i++) {
    el.innerHTML = `<div class="loading">辨識中 ${i+1}/${uploadedFiles.length}</div>`;
    const base64 = await fileToBase64(uploadedFiles[i]);
    const prompt = `這是一張台灣統一發票（可能是紙本三聯式、二聯式、電子發票、收銀機發票）。
請辨識並回傳 JSON，不要加 markdown 標記：
{
  "invoice_no": "發票號碼（字軌+8位數字）",
  "date": "YYYY-MM-DD",
  "seller_name": "賣方名稱",
  "seller_tax_id": "賣方統一編號（8位數字）",
  "buyer_tax_id": "買方統一編號（如有）",
  "items": [{"name":"品名","qty":數量,"price":單價,"amount":金額}],
  "subtotal": 銷售額,
  "tax": 稅額,
  "total": 總計,
  "category_suggest": "從以下科目中選最適合的：${cats}"
}
如果某欄位看不清楚填 null。金額必須是數字不要加逗號。`;

    try {
      const result = await callAI(prompt, base64);
      const clean = result.replace(/```json?\n?/g, '').replace(/```/g, '').trim();
      const inv = JSON.parse(clean);
      inv._source = 'scan';
      results.push(inv);
    } catch(e) {
      results.push({ _error: e.message, _source: 'scan', invoice_no: `辨識失敗-${i+1}` });
    }
  }

  // Save and show
  const existing = getInvoices();
  const merged = [...existing, ...results.filter(r => !r._error)];
  saveInvoices(merged);

  el.innerHTML = `<div class="status status-ok">✅ 辨識完成：${results.filter(r=>!r._error).length} 成功，${results.filter(r=>r._error).length} 失敗</div>`;
  el.innerHTML += renderInvoiceTable(results);
  uploadedFiles = [];
  document.getElementById('upload-preview').innerHTML = '';
  document.getElementById('scan-btn').style.display = 'none';
}

function fileToBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(file);
  });
}

// ===== Import CSV =====
function importCSV() {
  const raw = document.getElementById('csv-invoices').value.trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.split(',').map(s => s.trim()));
  if (lines.length < 2) { document.getElementById('import-output').innerHTML = '<div class="status status-warn">至少需要標題列 + 1 筆資料</div>'; return; }

  const header = lines[0];
  const data = lines.slice(1).map(row => {
    const obj = {};
    header.forEach((h, i) => obj[h] = row[i] || '');
    return obj;
  });

  // Map to standard format
  const cats = getCats();
  const invoices = data.map(d => ({
    invoice_no: d['發票號碼'] || d['invoice_no'] || '',
    date: d['日期'] || d['date'] || '',
    seller_name: d['賣方名稱'] || d['seller_name'] || d['廠商'] || '',
    seller_tax_id: d['賣方統編'] || d['seller_tax_id'] || d['統編'] || '',
    items: [{ name: d['品名'] || d['item'] || '', qty: parseFloat(d['數量'] || d['qty'] || 1), price: parseFloat(d['單價'] || d['price'] || 0), amount: parseFloat(d['金額'] || d['amount'] || 0) }],
    subtotal: parseFloat(d['金額'] || d['amount'] || 0),
    tax: parseFloat(d['稅額'] || d['tax'] || 0),
    total: parseFloat(d['金額'] || d['amount'] || 0) + parseFloat(d['稅額'] || d['tax'] || 0),
    category_suggest: guessCategory(d['品名'] || d['item'] || '', cats),
    _source: 'csv'
  }));

  const existing = getInvoices();
  saveInvoices([...existing, ...invoices]);
  document.getElementById('import-output').innerHTML = `<div class="status status-ok">✅ 匯入 ${invoices.length} 筆發票</div>` + renderInvoiceTable(invoices);
}

function guessCategory(itemName, cats) {
  const rules = {
    '辦公用品': /紙|筆|資料夾|碳粉|墨水|信封|便利貼|釘書/,
    '維修材料': /螺絲|管|閥|軸承|皮帶|工具|焊|砂紙/,
    '水電費': /電費|水費|瓦斯|台電|自來水/,
    '電信費': /電話|網路|中華電信|遠傳|手機/,
    '運費': /運費|快遞|宅配|貨運|物流/,
    '保險費': /保險|產險|壽險/,
    '租金': /租金|房租|場地/,
    '廣告行銷': /廣告|印刷|名片|海報|DM|看板/,
    '餐飲交際': /餐|飲|便當|咖啡|茶|聚餐/,
    '清潔用品': /清潔|洗|抹布|垃圾袋|衛生紙/,
    '資訊設備': /電腦|螢幕|鍵盤|滑鼠|硬碟|記憶體|軟體|網域/,
  };
  for (const [cat, re] of Object.entries(rules)) {
    if (cats.includes(cat) && re.test(itemName)) return cat;
  }
  return '雜支';
}

// ===== Render table =====
function renderInvoiceTable(invoices) {
  if (!invoices.length) return '';
  return `<div class="table-wrap"><table class="data-table">
    <tr><th>發票號碼</th><th>日期</th><th>賣方</th><th>品名</th><th>金額</th><th>科目</th></tr>
    ${invoices.map(inv => {
      if (inv._error) return `<tr><td colspan="6"><span class="tag tag-err">❌ ${inv._error}</span></td></tr>`;
      const items = (inv.items || []).map(i => i.name).join('、') || '-';
      return `<tr>
        <td>${inv.invoice_no || '-'}</td>
        <td>${inv.date || '-'}</td>
        <td>${inv.seller_name || '-'}</td>
        <td>${items}</td>
        <td style="text-align:right">$${(inv.total||0).toLocaleString()}</td>
        <td><span class="tag tag-cat">${inv.category_suggest || '未分類'}</span></td>
      </tr>`;
    }).join('')}
  </table></div>`;
}

// ===== Match (對帳) =====
function runMatch() {
  const invoices = getInvoices();
  const orders = getOrders();
  const el = document.getElementById('match-output');

  if (!invoices.length) { el.innerHTML = '<div class="status status-warn">沒有發票資料，請先匯入或辨識</div>'; return; }

  // Detect duplicates
  const noMap = {};
  const dupes = [];
  invoices.forEach((inv, i) => {
    const no = inv.invoice_no;
    if (noMap[no] !== undefined) dupes.push(no);
    noMap[no] = i;
  });

  // Match with orders
  const matched = [];
  const unmatched_inv = [];
  const unmatched_ord = [...orders];

  invoices.forEach(inv => {
    const taxId = inv.seller_tax_id;
    const amt = inv.total || inv.subtotal || 0;
    let bestIdx = -1, bestDiff = Infinity;
    unmatched_ord.forEach((ord, oi) => {
      if ((ord['供應商統編'] || ord['seller_tax_id']) === taxId) {
        const ordAmt = parseFloat(ord['金額'] || ord['amount'] || 0);
        const diff = Math.abs(amt - ordAmt);
        if (diff < bestDiff) { bestDiff = diff; bestIdx = oi; }
      }
    });
    if (bestIdx >= 0 && bestDiff <= amt * 0.05) {
      const ord = unmatched_ord.splice(bestIdx, 1)[0];
      matched.push({ inv, ord, diff: bestDiff });
    } else {
      unmatched_inv.push(inv);
    }
  });

  // Stats
  const statsEl = document.getElementById('match-stats');
  statsEl.innerHTML = `
    <div class="stat-card"><div class="stat-num">${invoices.length}</div><div class="stat-label">發票總數</div></div>
    <div class="stat-card"><div class="stat-num">${matched.length}</div><div class="stat-label">已配對</div></div>
    <div class="stat-card"><div class="stat-num" style="color:${unmatched_inv.length?'#b9770e':'#1e8449'}">${unmatched_inv.length}</div><div class="stat-label">未配對發票</div></div>
    <div class="stat-card"><div class="stat-num" style="color:${dupes.length?'#922b21':'#1e8449'}">${dupes.length}</div><div class="stat-label">重複發票</div></div>
  `;

  let html = '';
  if (dupes.length) {
    html += `<div class="status status-err">⚠️ 發現重複發票：${dupes.join('、')}</div>`;
  }
  if (orders.length === 0) {
    html += '<div class="status status-warn">尚未匯入訂單，無法對帳。請到「匯入 CSV」載入訂單資料。</div>';
  }
  if (matched.length) {
    html += '<h3 style="margin-top:16px; font-size:15px;">✅ 配對成功</h3>';
    html += `<div class="table-wrap"><table class="data-table">
      <tr><th>發票</th><th>訂單</th><th>金額差異</th><th>狀態</th></tr>
      ${matched.map(m => `<tr>
        <td>${m.inv.invoice_no}</td>
        <td>${m.ord['訂單編號'] || m.ord['order_id'] || '-'}</td>
        <td style="text-align:right">$${m.diff.toLocaleString()}</td>
        <td>${m.diff === 0 ? '<span class="tag tag-ok">完全一致</span>' : '<span class="tag tag-warn">金額差異</span>'}</td>
      </tr>`).join('')}
    </table></div>`;
  }
  if (unmatched_inv.length) {
    html += '<h3 style="margin-top:16px; font-size:15px;">❓ 未配對發票</h3>';
    html += renderInvoiceTable(unmatched_inv);
  }
  el.innerHTML = html;
}

// ===== Report =====
function genReport() {
  const invoices = getInvoices();
  const el = document.getElementById('report-output');
  if (!invoices.length) { el.innerHTML = '<div class="status status-warn">沒有發票資料</div>'; return; }

  // By category
  const byCat = {};
  let grandTotal = 0;
  invoices.forEach(inv => {
    const cat = inv.category_suggest || '未分類';
    byCat[cat] = (byCat[cat] || 0) + (inv.total || inv.subtotal || 0);
    grandTotal += (inv.total || inv.subtotal || 0);
  });
  const sorted = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
  const maxVal = sorted[0]?.[1] || 1;

  // By month
  const byMonth = {};
  invoices.forEach(inv => {
    const m = (inv.date || '').slice(0, 7) || '未知';
    byMonth[m] = (byMonth[m] || 0) + (inv.total || inv.subtotal || 0);
  });

  let html = `<div class="stats">
    <div class="stat-card"><div class="stat-num">${invoices.length}</div><div class="stat-label">發票總數</div></div>
    <div class="stat-card"><div class="stat-num">$${grandTotal.toLocaleString()}</div><div class="stat-label">總金額</div></div>
    <div class="stat-card"><div class="stat-num">${Object.keys(byCat).length}</div><div class="stat-label">科目數</div></div>
  </div>`;

  html += '<h3 style="font-size:15px; margin:16px 0 8px;">各科目支出</h3>';
  sorted.forEach(([cat, amt]) => {
    const pct = (amt / grandTotal * 100).toFixed(1);
    const width = (amt / maxVal * 100).toFixed(0);
    html += `<div class="chart-bar">
      <div class="chart-label">${cat}</div>
      <div class="chart-fill" style="width:${width}%"></div>
      <div class="chart-val">$${amt.toLocaleString()} (${pct}%)</div>
    </div>`;
  });

  if (Object.keys(byMonth).length > 1) {
    html += '<h3 style="font-size:15px; margin:16px 0 8px;">月度趨勢</h3>';
    const mSorted = Object.entries(byMonth).sort();
    const mMax = Math.max(...mSorted.map(m => m[1]));
    mSorted.forEach(([m, amt]) => {
      html += `<div class="chart-bar">
        <div class="chart-label">${m}</div>
        <div class="chart-fill" style="width:${(amt/mMax*100).toFixed(0)}%; background:#27ae60"></div>
        <div class="chart-val">$${amt.toLocaleString()}</div>
      </div>`;
    });
  }

  // Anomalies
  const avg = grandTotal / invoices.length;
  const outliers = invoices.filter(inv => (inv.total || 0) > avg * 3);
  if (outliers.length) {
    html += '<h3 style="font-size:15px; margin:16px 0 8px;">⚠️ 金額異常（超過平均 3 倍）</h3>';
    html += renderInvoiceTable(outliers);
  }

  el.innerHTML = html;
}

function loadDemoOrders() {
  const rows = ['訂單編號,供應商統編,品名,金額,日期'];
  const invoices = getInvoices();
  invoices.slice(0, 30).forEach((inv, i) => {
    const ordAmt = (inv.total||0) + (Math.random() > 0.8 ? Math.round(Math.random()*100-50) : 0);
    rows.push(`PO-${String(i+1).padStart(3,'0')},${inv.seller_tax_id||''},${(inv.items||[{}])[0]?.name||''},${ordAmt},${inv.date||''}`);
  });
  document.getElementById('csv-orders').value = rows.join('\n');
  // Parse and save
  const lines = rows.map(l => l.split(','));
  const header = lines[0];
  const data = lines.slice(1).map(row => { const o = {}; header.forEach((h,i) => o[h] = row[i]||''); return o; });
  saveOrders(data);
}

// ===== Import orders from textarea =====
document.getElementById('csv-orders')?.addEventListener('change', function() {
  const raw = this.value.trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.split(',').map(s => s.trim()));
  if (lines.length < 2) return;
  const header = lines[0];
  const data = lines.slice(1).map(row => { const o = {}; header.forEach((h,i) => o[h] = row[i]||''); return o; });
  saveOrders(data);
});
