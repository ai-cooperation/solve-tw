name: Solution Submission Check

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  check-submission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Decision Log exists
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            const fileNames = files.map(f => f.filename);
            const hasDecisionLog = fileNames.some(f =>
              f.toLowerCase().includes('decision-log') ||
              f.toLowerCase().includes('decision_log')
            );
            const hasReadme = fileNames.some(f =>
              f.toLowerCase().endsWith('readme.md')
            );
            const inSolutionsDir = fileNames.some(f =>
              f.includes('/solutions/')
            );

            let comment = '## Submission Checklist\n\n';

            if (inSolutionsDir) {
              comment += '- ✅ 檔案在 `solutions/` 目錄下\n';
            } else {
              comment += '- ⚠️ 檔案不在 `solutions/` 目錄下 — 請確認路徑正確\n';
            }

            if (hasDecisionLog) {
              comment += '- ✅ 找到 Decision Log\n';
            } else {
              comment += '- ❌ **缺少 Decision Log** — 沒有 Decision Log 的解法不會被 Review，聲望積分砍半\n';
              comment += '  - 模板: [Decision Log Template](../docs/decision-log-template.md)\n';
            }

            if (hasReadme) {
              comment += '- ✅ 找到 README\n';
            } else {
              comment += '- ⚠️ 缺少 README — 建議加上使用說明\n';
            }

            comment += '\n---\n';
            comment += '*此為自動檢查，不影響 Review。但強烈建議補齊缺少的項目。*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            });
