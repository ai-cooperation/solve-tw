<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老師傅知識庫</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: #f5f5f0; color: #333; font-size: 18px; }

.header { background: #2c3e50; color: #fff; padding: 14px 16px; text-align: center; }
.header h1 { font-size: 22px; letter-spacing: 1px; }
.header small { color: #95a5a6; font-size: 13px; }

/* Two big mode buttons */
.mode-switch { display: flex; background: #fff; border-bottom: 2px solid #eee; }
.mode-btn { flex: 1; padding: 16px; text-align: center; cursor: pointer; font-size: 18px; font-weight: bold; border: none; background: #fff; transition: all .2s; border-bottom: 4px solid transparent; }
.mode-btn.active { background: #fdf6e3; border-bottom-color: #e67e22; }
.mode-btn:first-child { border-right: 1px solid #eee; }
.mode-icon { font-size: 28px; display: block; margin-bottom: 4px; }

.content { max-width: 640px; margin: 0 auto; padding: 16px; }
.panel { display: none; }
.panel.active { display: block; }

/* Cards */
.card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); border-left: 4px solid #e67e22; }
.card h3 { font-size: 18px; margin-bottom: 8px; }
.card-meta { font-size: 13px; color: #888; margin-bottom: 8px; }
.card-tag { display: inline-block; background: #fdf6e3; color: #e67e22; padding: 2px 10px; border-radius: 12px; font-size: 13px; margin-right: 6px; margin-bottom: 4px; }
.card-section { margin-top: 10px; }
.card-section strong { font-size: 14px; color: #666; }
.card-section p { margin-top: 4px; line-height: 1.7; }

/* Form */
label { display: block; font-weight: bold; margin: 16px 0 6px; font-size: 16px; }
input, textarea, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; font-family: inherit; }
textarea { min-height: 100px; resize: vertical; }
input:focus, textarea:focus { outline: none; border-color: #e67e22; box-shadow: 0 0 0 3px rgba(230,126,34,.15); }
.hint { font-size: 14px; color: #999; margin-top: 4px; }

/* Big record button */
.record-area { text-align: center; margin: 20px 0; }
.record-btn { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #e67e22; background: #fff; cursor: pointer; font-size: 16px; font-weight: bold; color: #e67e22; transition: all .2s; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto; }
.record-btn:hover { background: #fdf6e3; }
.record-btn.recording { background: #e74c3c; border-color: #c0392b; color: #fff; animation: pulse 1.5s infinite; }
.record-btn .rec-icon { font-size: 36px; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

/* Buttons */
.btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 16px; transition: all .2s; }
.btn-primary { background: #e67e22; color: #fff; }
.btn-primary:hover { background: #d35400; }
.btn-secondary { background: #ecf0f1; color: #555; }
.btn-sm { display: inline-block; width: auto; padding: 8px 16px; font-size: 14px; margin-top: 8px; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-row { display: flex; gap: 8px; margin-top: 12px; }
.btn-row .btn { flex: 1; margin-top: 0; }

/* Search */
.search-box { position: relative; }
.search-box input { padding-right: 50px; }
.search-submit { position: absolute; right: 4px; top: 4px; bottom: 4px; width: 44px; border: none; background: #e67e22; color: #fff; border-radius: 6px; font-size: 20px; cursor: pointer; }

/* Status */
.status { padding: 10px 16px; border-radius: 8px; margin: 12px 0; font-size: 15px; }
.status-ok { background: #e8f5e9; color: #2e7d32; }
.status-warn { background: #fff8e1; color: #f57f17; }
.status-err { background: #fce4ec; color: #c62828; }

/* Loading */
.loading { text-align: center; padding: 24px; color: #999; font-size: 16px; }
.loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 3px solid #ddd; border-top-color: #e67e22; border-radius: 50%; animation: spin .8s linear infinite; margin-left: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Answer card */
.answer-card { background: #fff; border: 2px solid #27ae60; border-radius: 12px; padding: 20px; margin-top: 16px; line-height: 1.8; font-size: 17px; }
.answer-card h3 { color: #27ae60; margin-bottom: 12px; }

/* Settings */
.settings { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.settings summary { cursor: pointer; font-weight: bold; font-size: 16px; }

/* Stats bar */
.stats { display: flex; gap: 12px; margin-bottom: 16px; }
.stat { flex: 1; background: #fff; border-radius: 8px; padding: 12px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.stat-num { font-size: 28px; font-weight: bold; color: #e67e22; }
.stat-label { font-size: 12px; color: #999; }

/* Empty state */
.empty { text-align: center; padding: 40px 20px; color: #bbb; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }

@media (max-width: 400px) { .mode-btn { font-size: 16px; padding: 12px 8px; } }
</style>
</head>
<body>

<div class="header">
  <h1>🔧 老師傅知識庫</h1>
  <small>師傅用講的存，新人用問的找 ｜ cooperation.tw</small>
</div>

<div class="mode-switch">
  <div class="mode-btn active" data-mode="ask"><span class="mode-icon">🔍</span>新人提問</div>
  <div class="mode-btn" data-mode="record"><span class="mode-icon">🎤</span>師傅錄入</div>
</div>

<div class="content">

<!-- ===== 新人提問 ===== -->
<div class="panel active" id="panel-ask">
  <div class="stats">
    <div class="stat"><div class="stat-num" id="card-count">0</div><div class="stat-label">知識卡片</div></div>
    <div class="stat"><div class="stat-num" id="category-count">0</div><div class="stat-label">主題類別</div></div>
    <div class="stat"><div class="stat-num" id="master-count">0</div><div class="stat-label">位師傅</div></div>
  </div>

  <div class="search-box">
    <input type="text" id="ask-input" placeholder="問問題，例：模具卡料怎麼處理？" autofocus>
    <button class="search-submit" onclick="askQuestion()">→</button>
  </div>
  <div class="hint">可以用口語問，例如「射出機溫度怎麼調」「客戶 A 的產品要注意什麼」</div>

  <div id="ask-output"></div>

  <h3 style="margin-top:24px; margin-bottom:12px; font-size:16px; color:#888;">📚 所有知識卡片</h3>
  <div id="card-list"></div>
</div>

<!-- ===== 師傅錄入 ===== -->
<div class="panel" id="panel-record">
  <details class="settings" open>
    <summary>⚙️ 設定</summary>
    <label>AI 服務</label>
    <select id="ai-provider">
      <option value="gemini">Google Gemini（免費）</option>
      <option value="openai">OpenAI</option>
    </select>
    <label>API Key</label>
    <input type="password" id="api-key" placeholder="貼上 API Key">
    <div class="hint" style="color:#2e7d32">🔒 Key 只在記憶體中，關頁面即消失</div>
    <button class="btn btn-secondary btn-sm" onclick="testKey()">測試連線</button>
    <div id="key-status"></div>

    <label>師傅姓名</label>
    <input type="text" id="master-name" placeholder="例：陳師傅" value="">

    <label>主題類別</label>
    <select id="record-category">
      <option>設備操作</option>
      <option>品質異常</option>
      <option>客戶需求</option>
      <option>模具保養</option>
      <option>安全注意</option>
      <option>其他</option>
    </select>
  </details>

  <div class="record-area">
    <p style="margin-bottom:12px; color:#666;">按住按鈕講話，放開自動整理</p>
    <button class="record-btn" id="rec-btn" onmousedown="startRec()" onmouseup="stopRec()" ontouchstart="startRec()" ontouchend="stopRec()">
      <span class="rec-icon">🎤</span>
      <span>按住講話</span>
    </button>
  </div>

  <div id="rec-status"></div>

  <div id="raw-speech" style="display:none">
    <label>師傅原話（可修改）</label>
    <textarea id="speech-text"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="processToCard()">✨ AI 整理成知識卡片</button>
      <button class="btn btn-secondary" onclick="clearRec()">清除</button>
    </div>
  </div>

  <div id="card-preview"></div>
</div>

</div>

<script>
// ===== Mode switching =====
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.mode).classList.add('active');
  });
});

// Enter key to search
document.getElementById('ask-input').addEventListener('keydown', e => { if (e.key === 'Enter') askQuestion(); });

// ===== Knowledge Base (localStorage) =====
function getCards() {
  return JSON.parse(localStorage.getItem('stw_cards') || '[]');
}
function saveCards(cards) {
  localStorage.setItem('stw_cards', JSON.stringify(cards));
  updateStats();
  renderCards();
}
function addCard(card) {
  const cards = getCards();
  card.id = Date.now();
  card.created = new Date().toISOString().slice(0, 10);
  cards.unshift(card);
  saveCards(cards);
}

// ===== Stats =====
function updateStats() {
  const cards = getCards();
  document.getElementById('card-count').textContent = cards.length;
  const cats = new Set(cards.map(c => c.category));
  document.getElementById('category-count').textContent = cats.size;
  const masters = new Set(cards.map(c => c.master));
  document.getElementById('master-count').textContent = masters.size;
}

// ===== Render all cards =====
function renderCards() {
  const cards = getCards();
  const el = document.getElementById('card-list');
  if (cards.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>還沒有知識卡片<br>切到「師傅錄入」開始建立</div>';
    return;
  }
  el.innerHTML = cards.map((c, i) => cardHTML(c, i)).join('');
}
function cardHTML(c, idx) {
  return `<div class="card">
    <div class="card-meta">${c.master} ・ ${c.category} ・ ${c.created}</div>
    <h3>${c.title}</h3>
    <div class="card-section"><strong>🔍 問題</strong><p>${c.problem}</p></div>
    <div class="card-section"><strong>✅ 解法</strong><p>${c.solution}</p></div>
    <div class="card-section"><strong>📋 適用情境</strong><p>${c.context}</p></div>
    ${c.warning ? `<div class="card-section"><strong>⚠️ 注意事項</strong><p>${c.warning}</p></div>` : ''}
    <button class="btn btn-secondary btn-sm" onclick="deleteCard(${idx})">🗑️ 刪除</button>
  </div>`;
}
function deleteCard(idx) {
  if (!confirm('確定刪除這張知識卡片？')) return;
  const cards = getCards();
  cards.splice(idx, 1);
  saveCards(cards);
}

// ===== Speech Recognition =====
let recognition = null;
let isRecording = false;

function startRec() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    document.getElementById('rec-status').innerHTML = '<div class="status status-err">你的瀏覽器不支援語音辨識，請用 Chrome</div>';
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'zh-TW';
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalText = '';
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('speech-text').value = finalText + interim;
    document.getElementById('raw-speech').style.display = 'block';
  };
  recognition.onerror = (e) => {
    document.getElementById('rec-status').innerHTML = `<div class="status status-err">語音辨識錯誤：${e.error}</div>`;
    isRecording = false;
    document.getElementById('rec-btn').classList.remove('recording');
  };
  recognition.start();
  isRecording = true;
  document.getElementById('rec-btn').classList.add('recording');
  document.getElementById('rec-btn').querySelector('span:last-child').textContent = '正在聽...';
  document.getElementById('rec-status').innerHTML = '<div class="status status-warn">🎤 正在聽⋯⋯放開按鈕即停止</div>';
}

function stopRec() {
  if (recognition && isRecording) {
    recognition.stop();
    isRecording = false;
    document.getElementById('rec-btn').classList.remove('recording');
    document.getElementById('rec-btn').querySelector('span:last-child').textContent = '按住講話';
    document.getElementById('rec-status').innerHTML = '';
  }
}

function clearRec() {
  document.getElementById('speech-text').value = '';
  document.getElementById('raw-speech').style.display = 'none';
  document.getElementById('card-preview').innerHTML = '';
}

// ===== AI Call =====
async function callAI(prompt) {
  const key = sessionStorage.getItem('stw_api-key');
  const provider = sessionStorage.getItem('stw_ai-provider') || 'gemini';
  if (!key) throw new Error('請先在設定區填入 API Key');

  if (provider === 'gemini') {
    const model = 'gemini-3.1-flash-lite-preview';
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const body = await r.text();
    if (r.ok) {
      const d = JSON.parse(body);
      const text = d.candidates?.[0]?.content?.parts?.[0]?.text;
      if (text) return text;
      throw new Error('模型回傳空內容');
    }
    let msg = `HTTP ${r.status}`;
    try { const e = JSON.parse(body); msg = e.error?.message || msg; } catch(_) {}
    throw new Error(msg);
  } else {
    const r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }], temperature: 0.3 })
    });
    if (!r.ok) throw new Error('API 錯誤：' + r.status);
    const d = await r.json();
    return d.choices?.[0]?.message?.content || '';
  }
}

// ===== Test key =====
async function testKey() {
  const key = document.getElementById('api-key').value.trim();
  const provider = document.getElementById('ai-provider').value;
  const el = document.getElementById('key-status');
  if (!key) { el.innerHTML = '<div class="status status-warn">請先填入 API Key</div>'; return; }
  el.innerHTML = '<div class="loading">測試中</div>';
  try {
    if (provider === 'gemini') {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
      if (!r.ok) throw new Error('Key 無效');
    } else {
      const r = await fetch('https://api.openai.com/v1/models', { headers: { 'Authorization': 'Bearer ' + key } });
      if (!r.ok) throw new Error('Key 無效');
    }
    sessionStorage.setItem('stw_api-key', key);
    sessionStorage.setItem('stw_ai-provider', provider);
    el.innerHTML = '<div class="status status-ok">✅ 連線成功！</div>';
  } catch(e) {
    el.innerHTML = '<div class="status status-err">❌ ' + e.message + '</div>';
  }
}

// ===== Process speech → knowledge card =====
async function processToCard() {
  const speech = document.getElementById('speech-text').value.trim();
  if (!speech) return;
  const master = document.getElementById('master-name').value || '匿名師傅';
  const category = document.getElementById('record-category').value;
  const el = document.getElementById('card-preview');
  el.innerHTML = '<div class="loading">AI 正在整理師傅的經驗</div>';

  const prompt = `你是工廠知識管理助手。以下是一位有 25 年經驗的老師傅口述的工作經驗，請整理成結構化的知識卡片。

師傅原話（口語，可能有贅字、重複、台語）：
「${speech}」

請用 JSON 格式回傳，不要加 markdown 標記：
{
  "title": "一句話標題（15字內）",
  "problem": "什麼情況下會遇到這個問題",
  "solution": "怎麼解決（步驟化，用師傅的語氣但整理清楚）",
  "context": "什麼時候適用這個方法",
  "warning": "注意事項或容易犯的錯（沒有就填空字串）"
}

重要：
- 保留師傅的語氣和用詞（例如「催落去」「歸組」這些保留）
- solution 要具體、有步驟，不要抽象
- 繁體中文`;

  try {
    const result = await callAI(prompt);
    const clean = result.replace(/```json?\n?/g, '').replace(/```/g, '').trim();
    const card = JSON.parse(clean);
    card.master = master;
    card.category = category;

    el.innerHTML = `
      <h3 style="margin:16px 0 8px; font-size:16px;">📝 AI 整理結果（確認後儲存）</h3>
      ${cardHTML(card, -1)}
      <div class="btn-row">
        <button class="btn btn-primary" onclick='confirmSave(${JSON.stringify(JSON.stringify(card))})'>💾 儲存到知識庫</button>
        <button class="btn btn-secondary" onclick="processToCard()">🔄 重新整理</button>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="status status-err">❌ ${e.message}</div>`;
  }
}

function confirmSave(cardJson) {
  const card = JSON.parse(cardJson);
  addCard(card);
  document.getElementById('card-preview').innerHTML = '<div class="status status-ok">✅ 已儲存！師傅的經驗不會失傳了。</div>';
  clearRec();
}

// ===== Ask question =====
async function askQuestion() {
  const q = document.getElementById('ask-input').value.trim();
  if (!q) return;
  const cards = getCards();
  const el = document.getElementById('ask-output');

  if (cards.length === 0) {
    el.innerHTML = '<div class="status status-warn">知識庫還是空的，請先到「師傅錄入」建立知識卡片，或載入範例資料</div>';
    return;
  }

  const key = sessionStorage.getItem('stw_api-key');
  if (!key) {
    el.innerHTML = '<div class="status status-warn">請先到「師傅錄入」→ 設定，填入 API Key</div>';
    return;
  }

  el.innerHTML = '<div class="loading">正在翻閱師傅們的經驗</div>';

  const cardSummaries = cards.map((c, i) =>
    `[卡片${i+1}] ${c.title}\n師傅：${c.master}｜類別：${c.category}\n問題：${c.problem}\n解法：${c.solution}\n情境：${c.context}\n注意：${c.warning || '無'}`
  ).join('\n---\n');

  const prompt = `你是工廠的知識庫助手。新人問了一個問題，請從知識卡片中找到最相關的回答。

新人的問題：「${q}」

知識庫（共 ${cards.length} 張卡片）：
${cardSummaries}

回答規則：
1. 從知識卡片中找最相關的 1-3 張，綜合回答
2. 用師傅的語氣回答（親切、直接、像在現場教）
3. 明確標記是哪位師傅說的
4. 如果沒有直接相關的卡片，就說「師傅們還沒有講到這個，建議你去問 XX 類的師傅」
5. 繁體中文，不要用 markdown 標記

格式：
先直接回答問題（2-3 段），最後一行標記「📌 來源：卡片 X — XXX師傅」`;

  try {
    const result = await callAI(prompt);
    el.innerHTML = `<div class="answer-card"><h3>💡 師傅們的經驗</h3>${result.replace(/\n/g, '<br>')}</div>
      <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="document.getElementById('ask-input').value='';document.getElementById('ask-output').innerHTML=''">清除</button>`;
  } catch(e) {
    el.innerHTML = `<div class="status status-err">❌ ${e.message}</div>`;
  }
}

// ===== Demo data =====
function loadDemoData() {
  if (getCards().length > 0 && !confirm('會覆蓋現有資料，確定？')) return;
  const demo = [
    { master: '陳師傅', category: '設備操作', title: '射出機合模力不足的快速判斷',
      problem: '產品出現毛邊、溢料，懷疑合模力不夠',
      solution: '1. 先看產品分模線有沒有明顯毛邊\n2. 用手摸分模線，刮手就是合模力不夠\n3. 調高合模力 5-10 噸試打 3 模\n4. 還有毛邊就要檢查模具分模面有沒有磨損\n5. 分模面有壓痕就該送修了，不要硬撐',
      context: '產品突然開始出現毛邊，但配方和溫度沒改過的時候',
      warning: '合模力不要一次調太多，每次加 5 噸就好，超過機台上限會傷機器' },
